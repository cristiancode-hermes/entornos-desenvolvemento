<!DOCTYPE html>
<html lang="gl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Entornos de Desenvolvemento — Estudo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --bg3: #334155;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --primary: #6366f1;
    --primary-light: #818cf8;
    --primary-dark: #4f46e5;
    --accent: #22d3ee;
    --success: #22c55e;
    --warning: #eab308;
    --error: #ef4444;
    --radius: 12px;
    --shadow: 0 4px 6px -1px rgba(0,0,0,.3);
  }
  [data-theme="light"] {
    --bg: #f8fafc;
    --bg2: #ffffff;
    --bg3: #e2e8f0;
    --text: #1e293b;
    --text2: #64748b;
    --shadow: 0 4px 6px -1px rgba(0,0,0,.1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
  }
  /* Layout */
  .app-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--bg3);
    padding: 12px 20px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
    background: rgba(30,41,59,.85);
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px;
  }
  .logo { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .logo span { background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .xp-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); padding: 4px 12px 4px 4px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .xp-bar .level { background: var(--primary); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 11px; }
  .xp-fill { height: 6px; background: var(--bg); border-radius: 3px; width: 80px; overflow: hidden; }
  .xp-fill span { display: block; height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 3px; transition: width .5s; }
  .theme-btn {
    background: none; border: 1px solid var(--bg3); color: var(--text2);
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .theme-btn:hover { border-color: var(--primary); color: var(--text); }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

  /* Page sections */
  .page { display: none; }
  .page.active { display: block; }

  /* Home */
  .hero { text-align: center; padding: 32px 0 24px; }
  .hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .hero h1 span { background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--text2); font-size: 15px; max-width: 500px; margin: 0 auto; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px;
    margin: 24px 0;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius);
    padding: 16px; text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 800; }
  .stat-card .num.gold { color: var(--warning); }
  .stat-card .num.green { color: var(--success); }
  .stat-card .num.purple { color: var(--primary-light); }
  .stat-card .num.cyan { color: var(--accent); }
  .stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* Topic cards */
  .topic-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
    margin-top: 8px;
  }
  .topic-card {
    background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius);
    padding: 20px; cursor: pointer; transition: all .25s;
    position: relative; overflow: hidden;
  }
  .topic-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
  .topic-card .icon { font-size: 32px; margin-bottom: 8px; }
  .topic-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .topic-card p { font-size: 13px; color: var(--text2); line-height: 1.4; }
  .topic-card .meta { display: flex; gap: 12px; margin-top: 12px; font-size: 11px; color: var(--text2); }
  .topic-card .meta span { display: flex; align-items: center; gap: 4px; }
  .topic-card .progress-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .topic-card .progress-dot.done { background: var(--success); }
  .topic-card .progress-dot.partial { background: var(--warning); }
  .topic-card .progress-dot.none { background: var(--bg3); }
  .topic-card .badge {
    position: absolute; top: 12px; right: 12px;
    background: var(--primary); color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px;
  }

  /* Study view */
  .back-btn {
    background: none; border: none; color: var(--text2); cursor: pointer;
    display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500;
    padding: 8px 0; margin-bottom: 16px; transition: color .2s;
  }
  .back-btn:hover { color: var(--primary); }
  .topic-header { margin-bottom: 20px; }
  .topic-header h2 { font-size: 24px; font-weight: 800; }
  .topic-header .subtitle { color: var(--text2); font-size: 14px; margin-top: 4px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; background: var(--bg3); border-radius: var(--radius);
    padding: 4px; margin-bottom: 20px; overflow-x: auto;
  }
  .tab {
    padding: 8px 16px; border: none; background: none; color: var(--text2);
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
    white-space: nowrap; transition: all .2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Resumen sections */
  .resumen-section { margin-bottom: 24px; }
  .resumen-section h3 {
    font-size: 18px; font-weight: 700; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 2px solid var(--primary);
  }
  .resumen-section h4 { font-size: 15px; font-weight: 600; margin: 16px 0 8px; color: var(--primary-light); }
  .resumen-section p, .resumen-section li { font-size: 14px; line-height: 1.7; color: var(--text2); margin-bottom: 6px; }
  .resumen-section ul, .resumen-section ol { padding-left: 20px; margin: 8px 0; }
  .resumen-section strong { color: var(--text); }
  .resumen-section .key-concept {
    background: rgba(99,102,241,.1); border-left: 3px solid var(--primary);
    padding: 12px 16px; border-radius: 0 8px 8px 0; margin: 12px 0;
  }
  .resumen-section .key-concept p { margin: 0; color: var(--text); }
  .resumen-section table {
    width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px;
  }
  .resumen-section th, .resumen-section td {
    border: 1px solid var(--bg3); padding: 8px 12px; text-align: left;
  }
  .resumen-section th { background: var(--bg3); color: var(--text); font-weight: 600; }
  .resumen-section code {
    background: var(--bg3); padding: 2px 6px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .resumen-section .tag {
    display: inline-block; background: var(--bg3); padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 4px;
  }
  .resumen-section .tag.blue { background: rgba(99,102,241,.2); color: var(--primary-light); }
  .resumen-section .tag.green { background: rgba(34,197,94,.2); color: var(--success); }

  /* Quiz */
  .quiz-card {
    background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius);
    padding: 24px; margin-bottom: 16px;
  }
  .quiz-question { font-size: 16px; font-weight: 600; margin-bottom: 16px; line-height: 1.5; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option {
    padding: 12px 16px; border: 2px solid var(--bg3); border-radius: 8px;
    background: none; color: var(--text); cursor: pointer; text-align: left;
    font-size: 14px; transition: all .2s; font-family: inherit;
  }
  .quiz-option:hover { border-color: var(--primary); background: rgba(99,102,241,.05); }
  .quiz-option.selected { border-color: var(--primary); background: rgba(99,102,241,.1); }
  .quiz-option.correct { border-color: var(--success); background: rgba(34,197,94,.1); }
  .quiz-option.wrong { border-color: var(--error); background: rgba(239,68,68,.1); }
  .quiz-option:disabled { cursor: default; opacity: .7; }
  .quiz-feedback { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--success); }
  .quiz-feedback.wrong { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--error); }
  .quiz-controls { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .btn {
    padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--bg3); color: var(--text); }
  .btn-secondary:hover { background: var(--text2); color: var(--bg); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { opacity: .9; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .quiz-score {
    text-align: center; padding: 32px;
  }
  .quiz-score .big { font-size: 48px; font-weight: 800; }
  .quiz-score .big.gold { color: var(--warning); }
  .quiz-score .big.green { color: var(--success); }
  .quiz-score .big.red { color: var(--error); }
  .quiz-progress {
    display: flex; gap: 4px; margin-bottom: 16px; justify-content: center;
  }
  .quiz-progress .dot {
    width: 24px; height: 6px; border-radius: 3px; background: var(--bg3); transition: background .3s;
  }
  .quiz-progress .dot.correct { background: var(--success); }
  .quiz-progress .dot.wrong { background: var(--error); }
  .quiz-progress .dot.current { background: var(--primary); }

  /* Footer */
  .footer { text-align: center; padding: 32px 0; color: var(--text2); font-size: 12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

  /* Responsive */
  @media (max-width: 640px) {
    .container { padding: 16px 12px 40px; }
    .hero h1 { font-size: 24px; }
    .topic-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .tabs { font-size: 12px; }
    .tab { padding: 6px 12px; }
  }
  /* Animation */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .page.active { animation: fadeIn .3s ease; }
</style>
</head>

// ============================================================
// APP STATE
// ============================================================
const STORAGE_KEY = 'entornos-dev-progress';

let state = {
  xp: 0,
  level: 1,
  streak: 0,
  bestStreak: 0,
  questionsAnswered: 0,
  correctAnswered: 0,
  studiedTopics: new Set(),
  quizResults: {} // { temaId: { correct: N, total: N, answered: [true/false/...] } }
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state.xp = parsed.xp || 0;
      state.level = parsed.level || 1;
      state.streak = parsed.streak || 0;
      state.bestStreak = parsed.bestStreak || 0;
      state.questionsAnswered = parsed.questionsAnswered || 0;
      state.correctAnswered = parsed.correctAnswered || 0;
      state.studiedTopics = new Set(parsed.studiedTopics || []);
      state.quizResults = parsed.quizResults || {};
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    xp: state.xp,
    level: state.level,
    streak: state.streak,
    bestStreak: state.bestStreak,
    questionsAnswered: state.questionsAnswered,
    correctAnswered: state.correctAnswered,
    studiedTopics: [...state.studiedTopics],
    quizResults: state.quizResults
  }));
}

function addXP(amount) {
  state.xp += amount;
  while (state.xp >= state.level * 100) {
    state.xp -= state.level * 100;
    state.level++;
  }
  updateXPDisplay();
  saveState();
}

function updateXPDisplay() {
  const nextXP = state.level * 100;
  const pct = Math.min(100, (state.xp / nextXP) * 100);
  document.getElementById('xp-fill').style.width = pct + '%';
  document.getElementById('xp-text').textContent = state.xp + '/' + nextXP + ' XP';
  document.getElementById('level-badge').textContent = 'Lv.' + state.level;
}

// ============================================================
// RENDER
// ============================================================
function renderHome() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';
  TEMAS.forEach((t, i) => {
    const results = state.quizResults[t.id];
    const totalQ = t.preguntas.length;
    const doneQ = results ? results.answered.filter(Boolean).length : 0;
    const isStudied = state.studiedTopics.has(t.id);
    
    let statusDot = 'none';
    if (doneQ === totalQ && totalQ > 0) statusDot = 'done';
    else if (doneQ > 0) statusDot = 'partial';

    grid.innerHTML += `
      <div class="topic-card" onclick="openTopic(${i})">
        <div class="icon">${t.icon}</div>
        <h3>${t.short}</h3>
        <p>${t.desc}</p>
        <div class="meta">
          <span>📖 ${t.resumen.length} seccións</span>
          <span>🧪 ${totalQ} preguntas</span>
          <span><span class="progress-dot ${statusDot}"></span>${doneQ}/${totalQ}</span>
        </div>
        ${isStudied ? '<span class="badge">✅ Estudiado</span>' : ''}
      </div>
    `;
  });

  // Stats
  const temasEstudados = state.studiedTopics.size;
  document.getElementById('stat-studied').textContent = `${temasEstudados}/${TEMAS.length}`;
  document.getElementById('stat-questions').textContent = state.questionsAnswered;
  document.getElementById('stat-correct').textContent = state.correctAnswered;
  document.getElementById('stat-streak').textContent = state.streak;

  updateXPDisplay();
}

// ============================================================
// TOPIC VIEW
// ============================================================
let currentTopicIdx = 0;

function openTopic(idx) {
  currentTopicIdx = idx;
  const t = TEMAS[idx];
  
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-topic').classList.add('active');
  
  document.getElementById('topic-title').textContent = t.icon + ' ' + t.title;
  document.getElementById('topic-subtitle').textContent = t.desc;
  
  // Mark as studied
  state.studiedTopics.add(t.id);
  saveState();

  // Tabs
  document.querySelectorAll('#topic-tabs .tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('#topic-tabs .tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  renderResumen(t);
  renderQuiz(t);
}

function renderResumen(t) {
  const el = document.getElementById('resumen-content');
  el.innerHTML = t.resumen.map((sec, i) => `
    <div class="resumen-section">
      <h3>${sec.title}</h3>
      ${sec.content}
    </div>
  `).join('');
}

// ============================================================
// QUIZ ENGINE
// ============================================================
let quizState = { current: 0, answers: [], finished: false };

function renderQuiz(t) {
  const el = document.getElementById('quiz-content');
  
  // Init quiz state
  if (!state.quizResults[t.id]) {
    state.quizResults[t.id] = { correct: 0, total: t.preguntas.length, answered: t.preguntas.map(() => null) };
  }
  const results = state.quizResults[t.id];
  
  // Check if all done
  const allDone = results.answered.every(a => a !== null);
  if (allDone && results.total > 0) {
    showQuizScore(t, el);
    return;
  }
  
  // Find first unanswered
  quizState.current = results.answered.findIndex(a => a === null);
  if (quizState.current === -1) quizState.current = 0;
  quizState.answers = results.answered.slice();
  quizState.finished = false;
  
  showQuizQuestion(t, el);
}

function showQuizQuestion(t, el) {
  const results = state.quizResults[t.id];
  const i = quizState.current;
  const q = t.preguntas[i];
  
  const dots = t.preguntas.map((_, j) => {
    const a = quizState.answers[j];
    if (a === true) return '<span class="dot correct"></span>';
    if (a === false) return '<span class="dot wrong"></span>';
    return j === i ? '<span class="dot current"></span>' : '<span class="dot"></span>';
  }).join('');
  
  el.innerHTML = `
    <div class="quiz-progress">${dots}</div>
    <div class="quiz-card">
      <div class="quiz-question">${i+1}. ${q.q}</div>
      <div class="quiz-options" id="quiz-options">
        ${q.opts.map((opt, oi) => `
          <button class="quiz-option" data-idx="${oi}" ${quizState.answers[i] !== null ? 'disabled' : ''}>
            ${String.fromCharCode(65 + oi)}) ${opt}
          </button>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <div class="quiz-controls">
        <button class="btn btn-secondary" onclick="prevQuestion()" ${i === 0 ? 'disabled' : ''}>⬅ Anterior</button>
        <button class="btn btn-secondary" onclick="nextQuestion()" ${i >= t.preguntas.length - 1 ? 'disabled' : ''}>Seguinte ➡</button>
      </div>
    </div>
  `;

  // If already answered, show feedback
  if (quizState.answers[i] !== null) {
    const selectedIdx = t.preguntas[i].opts.findIndex((_, oi) => {
      // We stored boolean, need to find which option was chosen
      return false; // We'll handle differently
    });
    showFeedback(t, i, el);
  }

  // Click handlers
  document.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      if (quizState.answers[i] !== null) return;
      const oi = parseInt(btn.dataset.idx);
      answerQuestion(t, i, oi, el);
    });
  });
}

function answerQuestion(t, qi, oi, el) {
  const q = t.preguntas[qi];
  const correct = oi === q.ans;
  
  quizState.answers[qi] = correct;
  state.questionsAnswered++;
  if (correct) {
    state.correctAnswered++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    addXP(10);
  } else {
    state.streak = 0;
  }
  
  // Save
  state.quizResults[t.id].answered[qi] = correct;
  state.quizResults[t.id].correct = state.quizResults[t.id].answers.filter(Boolean).length;
  saveState();

  // Show feedback
  const feedback = document.getElementById('quiz-feedback');
  const options = document.querySelectorAll('.quiz-option');
  
  options.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    if (i === oi && !correct) btn.classList.add('wrong');
    if (i === oi) btn.classList.add('selected');
  });

  feedback.className = 'quiz-feedback show ' + (correct ? 'correct' : 'wrong');
  feedback.textContent = correct 
    ? '✅ Correcto! +10 XP' 
    : `❌ Incorrecto. A resposta correcta era ${String.fromCharCode(65 + q.ans)}) ${q.opts[q.ans]}`;

  // Re-render progress dots
  const dots = t.preguntas.map((_, j) => {
    const a = quizState.answers[j];
    if (a === true) return '<span class="dot correct"></span>';
    if (a === false) return '<span class="dot wrong"></span>';
    return j === quizState.current ? '<span class="dot current"></span>' : '<span class="dot"></span>';
  }).join('');
  document.querySelector('.quiz-progress').innerHTML = dots;

  // Update home stats
  document.getElementById('stat-questions').textContent = state.questionsAnswered;
  document.getElementById('stat-correct').textContent = state.correctAnswered;
  document.getElementById('stat-streak').textContent = state.streak;
}

function nextQuestion() {
  const t = TEMAS[currentTopicIdx];
  if (quizState.current < t.preguntas.length - 1) {
    quizState.current++;
    const el = document.getElementById('quiz-content');
    showQuizQuestion(t, el);
  }
}

function prevQuestion() {
  const t = TEMAS[currentTopicIdx];
  if (quizState.current > 0) {
    quizState.current--;
    const el = document.getElementById('quiz-content');
    showQuizQuestion(t, el);
  }
}

function showQuizScore(t, el) {
  const results = state.quizResults[t.id];
  const pct = results.total > 0 ? Math.round((results.correct / results.total) * 100) : 0;
  
  el.innerHTML = `
    <div class="quiz-score">
      <div class="big ${pct >= 70 ? 'green' : pct >= 40 ? 'gold' : 'red'}">${pct}%</div>
      <p style="font-size:18px;margin:8px 0;">${results.correct} / ${results.total} correctas</p>
      <p style="color:var(--text2);margin-bottom:20px;">${pct >= 70 ? '🎉 Moi ben! Preparado para o examen!' : pct >= 40 ? '💪 Segue practicando!' : '📚 Repasa o temario e tenta de novo!'}</p>
      <button class="btn btn-primary" onclick="resetQuiz()">🔁 Reintentar</button>
      <button class="btn btn-secondary" onclick="backHome()" style="margin-left:8px;">← Volver</button>
    </div>
  `;
}

function resetQuiz() {
  const t = TEMAS[currentTopicIdx];
  state.quizResults[t.id] = { correct: 0, total: t.preguntas.length, answered: t.preguntas.map(() => null) };
  saveState();
  renderQuiz(t);
}

function backHome() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-home').classList.add('active');
  renderHome();
}

// ============================================================
// INIT
// ============================================================
loadState();
renderHome();
